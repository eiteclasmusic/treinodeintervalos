<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treino de Ouvido</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="logo-area">
    <img src="logo.png" alt="Ei Teclas" class="logo">
    <h1>Treino de Ouvido</h1>
    <p class="subtitle">Desenvolva sua percepção musical</p>
  </div>

  <!-- 🔥 NÍVEIS -->
  <div class="level-controls">
    <button id="btn-easy" onclick="setLevel('easy')">Fácil</button>
    <button id="btn-medium" onclick="setLevel('medium')">Médio</button>
    <button id="btn-hard" onclick="setLevel('hard')">Difícil</button>
  </div>

  <div class="card">

    <div class="controls">
      <button id="padBtn" onclick="togglePad()">PAD</button>
      <button onclick="playListen()">OUVIR</button>
      <button onclick="nextExercise()">PRÓXIMO</button>
    </div>

    <p id="question">Carregando exercício...</p>

    <div id="answers"></div>

    <button class="confirm" onclick="confirmAnswer()">Confirmar Resposta</button>

    <p id="feedback"></p>

  </div>

  <div class="footer">
    Desenvolvido por <strong>Jonatas Carvalho</strong><br>
    Curso O Som Das Teclas<br>
    Tocando Teclado do Zero na Igreja
  </div>

</div>

<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<script src="script.js"></script>
</body>
</html>
